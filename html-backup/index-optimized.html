<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Meta Tags -->
    <meta name="description" content="Sistema completo de gestão de vendas com suporte offline">
    <meta name="keywords" content="vendas, gestão, clientes, produtos, orçamentos, sistema">
    <meta name="author" content="Sistema de Vendas">
    <meta name="theme-color" content="#2563eb">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sistema de Vendas">
    <meta name="msapplication-TileColor" content="#2563eb">
    <meta name="msapplication-config" content="/browserconfig.xml">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <!-- CSS OTIMIZADO - Substitui todos os arquivos CSS individuais -->
    <link rel="stylesheet" href="/css/optimized.css?v=1.0.0" />

    <!-- FontAwesome Icons (LOCAL) -->
    <link rel="stylesheet" href="/css/fontawesome-local.css?v=1.0.1" />

    <title>Sistema de Vendas</title>
</head>

<body>
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <h2>Carregando Sistema de Vendas...</h2>
            <p>Por favor, aguarde...</p>
        </div>
    </div>

    <!-- Main Content -->
    <div id="app" class="app-container" style="display: none;">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <button id="menu-toggle" class="menu-toggle" aria-label="Menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="header-title">Sistema de Vendas</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <span id="user-name">Usuário</span>
                        <button id="logout-btn" class="logout-btn" title="Sair">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Sidebar -->
        <nav id="sidebar" class="sidebar">
            <div class="sidebar-content">
                <ul class="sidebar-menu">
                    <li class="sidebar-item">
                        <a href="#dashboard" class="sidebar-link" data-page="dashboard">
                            <i class="fas fa-tachometer-alt"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#clientes" class="sidebar-link" data-page="clientes">
                            <i class="fas fa-users"></i>
                            <span>Clientes</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#produtos" class="sidebar-link" data-page="produtos">
                            <i class="fas fa-box"></i>
                            <span>Produtos</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#vendas" class="sidebar-link" data-page="vendas">
                            <i class="fas fa-shopping-cart"></i>
                            <span>Vendas</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#orcamentos" class="sidebar-link" data-page="orcamentos">
                            <i class="fas fa-file-invoice"></i>
                            <span>Orçamentos</span>
                        </a>
                    </li>
                    <li class="sidebar-item">
                        <a href="#relatorios" class="sidebar-link" data-page="relatorios">
                            <i class="fas fa-chart-bar"></i>
                            <span>Relatórios</span>
                        </a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Overlay -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Content Area -->
        <main id="main-content" class="main-content">
            <div id="page-content" class="page-content">
                <!-- Conteúdo das páginas será carregado aqui -->
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="/js/libs/chart.js"></script>
    <script src="/js/utils/event-manager.js"></script>
    <script src="/js/modules/config.js"></script>
    <script src="/js/modules/auth-manager.js"></script>
    <script src="/js/modules/data-manager.js"></script>
    <script src="/js/modules/ui-manager.js"></script>
    <script src="/js/modules/routing-manager.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/clientes.js"></script>
    <script src="/js/pages/produtos.js"></script>
    <script src="/js/pages/vendas.js"></script>
    <script src="/js/pages/orcamentos.js"></script>
    <script src="/js/pages/relatorios.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/database.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/app.js"></script>

    <!-- Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('✅ Service Worker registrado:', registration);
                    })
                    .catch(error => {
                        console.log('❌ Falha no registro do Service Worker:', error);
                    });
            });
        }
    </script>
</body>

</html>
