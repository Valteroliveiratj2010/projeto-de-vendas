<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste API</title>
</head>

<body>
    <h1>Teste da API</h1>
    <button onclick="testAPI()">Testar API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testando...';

            try {
                console.log('Testando API...');
                const response = await fetch('/api/produtos');
                console.log('Response status:', response.status);

                if (response.ok) {
                    const data = await response.json();
                    console.log('Data:', data);
                    resultDiv.innerHTML = `<pre>✅ Sucesso! ${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.innerHTML = `<pre>❌ Erro HTTP: ${response.status} ${response.statusText}</pre>`;
                }
            } catch (error) {
                console.error('Erro:', error);
                resultDiv.innerHTML = `<pre>❌ Erro: ${error.message}</pre>`;
            }
        }

        // Testar automaticamente ao carregar
        window.addEventListener('load', testAPI);
    </script>
</body>

</html>
