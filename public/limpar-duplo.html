<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Limpeza - Problemas de Carregamento Duplo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .status {
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
            font-weight: bold;
        }

        .status.info {
            background: #e3f2fd;
            color: #1976d2;
            border: 2px solid #2196f3;
        }

        .status.success {
            background: #e8f5e8;
            color: #2e7d32;
            border: 2px solid #4caf50;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border: 2px solid #f44336;
        }

        .btn {
            background: #2196f3;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1976d2;
            transform: translateY(-2px);
        }

        .btn.danger {
            background: #f44336;
        }

        .btn.danger:hover {
            background: #d32f2f;
        }

        .progress {
            width: 100%;
            height: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            width: 0%;
            transition: width 0.3s ease;
        }

        .log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🧹 Limpeza de Sistema</h1>

        <div class="status info" id="status">
            Problema identificado: Carregamento duplo de sistemas
        </div>

        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div class="log" id="log"></div>

        <button class="btn" onclick="startCleanup()">🚀 Iniciar Limpeza Completa</button>
        <button class="btn danger" onclick="forceReload()">🔄 Forçar Recarregamento</button>
    </div>

    <script>
        let logElement = document.getElementById('log');
        let progressBar = document.getElementById('progress');
        let statusElement = document.getElementById('status');

        function log(message) {
            const timestamp = new Date().toLocaleTimeString();
            logElement.innerHTML += `[${timestamp}] ${message}\n`;
            logElement.scrollTop = logElement.scrollHeight;
            console.log(message);
        }

        function updateProgress(percent) {
            progressBar.style.width = percent + '%';
        }

        function updateStatus(message, type = 'info') {
            statusElement.textContent = message;
            statusElement.className = `status ${type}`;
        }

        async function clearAllCaches() {
            log('🗑️ Limpando todos os caches...');
            updateProgress(20);

            try {
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    log(`📦 Caches encontrados: ${cacheNames.length}`);

                    for (const cacheName of cacheNames) {
                        log(`🗑️ Removendo cache: ${cacheName}`);
                        await caches.delete(cacheName);
                    }

                    log('✅ Todos os caches foram limpos!');
                } else {
                    log('⚠️ Cache API não disponível');
                }
            } catch (error) {
                log(`❌ Erro ao limpar caches: ${error.message}`);
            }
        }

        async function unregisterServiceWorkers() {
            log('🔧 Desregistrando Service Workers...');
            updateProgress(40);

            try {
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    log(`🔧 Service Workers encontrados: ${registrations.length}`);

                    for (const registration of registrations) {
                        log(`🔧 Desregistrando: ${registration.scope}`);
                        await registration.unregister();
                    }

                    log('✅ Todos os Service Workers foram desregistrados!');
                } else {
                    log('⚠️ Service Worker não disponível');
                }
            } catch (error) {
                log(`❌ Erro ao desregistrar Service Workers: ${error.message}`);
            }
        }

        function clearLocalStorage() {
            log('💾 Limpando localStorage...');
            updateProgress(60);

            try {
                // Salvar apenas dados essenciais
                const authToken = localStorage.getItem('authToken');
                const userData = localStorage.getItem('userData');

                // Limpar tudo
                localStorage.clear();

                // Restaurar dados essenciais
                if (authToken) {
                    localStorage.setItem('authToken', authToken);
                    log('✅ Token de autenticação preservado');
                }
                if (userData) {
                    localStorage.setItem('userData', userData);
                    log('✅ Dados do usuário preservados');
                }

                log('✅ LocalStorage limpo!');
            } catch (error) {
                log(`❌ Erro ao limpar localStorage: ${error.message}`);
            }
        }

        function checkDuplicateInstances() {
            log('🔍 Verificando instâncias duplicadas...');
            updateProgress(80);

            const instances = [
                { name: 'window.dashboardPage', value: window.dashboardPage },
                { name: 'window.DashboardPage', value: window.DashboardPage },
                { name: 'window.clientesPageInstance', value: window.clientesPageInstance },
                { name: 'window.ClientesPage', value: window.ClientesPage },
                { name: 'window.sistemaVendas', value: window.sistemaVendas }
            ];

            instances.forEach(instance => {
                if (instance.value) {
                    log(`✅ ${instance.name}: EXISTE`);
                } else {
                    log(`⚠️ ${instance.name}: NÃO EXISTE`);
                }
            });
        }

        async function startCleanup() {
            log('🚀 INICIANDO LIMPEZA COMPLETA...');
            updateStatus('Iniciando limpeza...', 'info');

            try {
                // 1. Limpar caches
                await clearAllCaches();

                // 2. Desregistrar Service Workers
                await unregisterServiceWorkers();

                // 3. Limpar localStorage
                clearLocalStorage();

                // 4. Verificar instâncias
                checkDuplicateInstances();

                updateProgress(100);
                updateStatus('Limpeza concluída com sucesso!', 'success');
                log('✅ LIMPEZA COMPLETA CONCLUÍDA!');

                // Recarregar após 3 segundos
                setTimeout(() => {
                    log('🔄 Recarregando página...');
                    window.location.href = '/';
                }, 3000);

            } catch (error) {
                log(`❌ Erro durante limpeza: ${error.message}`);
                updateStatus('Erro durante limpeza', 'error');
            }
        }

        function forceReload() {
            log('🔄 Forçando recarregamento...');
            window.location.href = '/';
        }

        // Log inicial
        log('🔍 Sistema de limpeza carregado');
        log('📋 Problema: Carregamento duplo de sistemas');
        log('🎯 Solução: Limpeza de cache e localStorage');
    </script>
</body>

</html>
